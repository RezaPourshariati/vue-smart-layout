name: Deploy Check

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/vue-app/**'
      - 'services/auth-server/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'tsconfig.base.json'
      - 'eslint.config.mjs'
      - 'uno.config.ts'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  deploy-check-vue-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint vue-app
        run: pnpm lint:vue-app

      - name: Type check vue-app
        run: pnpm type-check:vue-app

      - name: Build vue-app
        run: pnpm build:vue-app

  deploy-check-auth-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint auth-server
        run: pnpm lint:auth-server

      - name: Build auth-server
        run: pnpm build:auth-server
