name: PR Validation

on:
  pull_request:
    paths:
      - 'front-end/**'
      - 'back-end/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - 'uno.config.ts'
      - '.github/workflows/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      front-end: ${{ steps.filter.outputs.front-end }}
      back-end: ${{ steps.filter.outputs.back-end }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            front-end:
              - 'front-end/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'eslint.config.mjs'
              - 'uno.config.ts'
              - '.github/workflows/**'
            back-end:
              - 'back-end/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'eslint.config.mjs'
              - '.github/workflows/**'

  validate-front-end:
    needs: detect-changes
    if: needs.detect-changes.outputs.front-end == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint front-end
        run: pnpm lint:front-end

      - name: Type check front-end
        run: pnpm type-check:front-end

      - name: Build front-end
        run: pnpm build:front-end

  validate-back-end:
    needs: detect-changes
    if: needs.detect-changes.outputs.back-end == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint back-end
        run: pnpm lint:back-end

      - name: Build back-end
        run: pnpm build:back-end
