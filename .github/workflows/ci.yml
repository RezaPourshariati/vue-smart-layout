name: PR Validation

on:
  pull_request:
    paths:
      - 'apps/vue-app/**'
      - 'services/auth-server/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'tsconfig.base.json'
      - 'eslint.config.mjs'
      - 'uno.config.ts'
      - '.github/workflows/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      vue-app: ${{ steps.filter.outputs.vue-app }}
      auth-server: ${{ steps.filter.outputs.auth-server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            vue-app:
              - 'apps/vue-app/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'tsconfig.base.json'
              - 'eslint.config.mjs'
              - 'uno.config.ts'
              - '.github/workflows/**'
            auth-server:
              - 'services/auth-server/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'eslint.config.mjs'
              - '.github/workflows/**'

  validate-vue-app:
    needs: detect-changes
    if: needs.detect-changes.outputs.vue-app == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint vue-app
        run: pnpm lint:vue-app

      - name: Type check vue-app
        run: pnpm type-check:vue-app

      - name: Build vue-app
        run: pnpm build:vue-app

  validate-auth-server:
    needs: detect-changes
    if: needs.detect-changes.outputs.auth-server == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint auth-server
        run: pnpm lint:auth-server

      - name: Build auth-server
        run: pnpm build:auth-server
